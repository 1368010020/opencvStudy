name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write # softprops/action-gh-release 需要写权限才能创建 Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"

      # vcpkg 的二进制缓存：第一次跑会完整编译 OpenCV（很慢，30-60分钟+），
      # 之后只要 vcpkg.json 不变，会直接复用缓存的编译产物，几分钟内完成。
      - name: Export GitHub Actions cache variables (for vcpkg binary caching)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: "${{ github.workspace }}/vcpkg"

      - name: Configure (CMake + vcpkg manifest install)
        run: cmake --preset release
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

      - name: Build
        run: cmake --build build/release --config Release --parallel

      # CMake 没指定 -G，Windows 上默认选中的是多配置的 Visual Studio 生成器，
      # 它会自动在 RUNTIME_OUTPUT_DIRECTORY 下面再加一层 Release/Debug 子目录，
      # 项目的 CMakeLists.txt 里设的输出目录没考虑这层，实际路径会漂移。
      # 与其硬编码猜测子目录名，不如递归找到真实产物所在目录，更抗生成器差异。
      - name: Locate build output
        id: locate
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path "build\release" -Recurse -Filter "OpenCVPractice.exe" | Select-Object -First 1
          if (-not $exe) {
            throw "OpenCVPractice.exe not found anywhere under build\release"
          }
          Write-Host "Found exe at: $($exe.FullName)"
          echo "bin_dir=$($exe.DirectoryName)" >> $env:GITHUB_OUTPUT

      - name: Bundle Qt runtime DLLs
        run: |
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --release --no-translations "${{ steps.locate.outputs.bin_dir }}\OpenCVPractice.exe"
        shell: pwsh

      - name: Bundle OpenCV / vcpkg runtime DLLs
        run: |
          Copy-Item "build\release\vcpkg_installed\x64-windows\bin\*.dll" "${{ steps.locate.outputs.bin_dir }}\" -Force
        shell: pwsh

      - name: Package zip
        run: |
          Compress-Archive -Path "${{ steps.locate.outputs.bin_dir }}\*" -DestinationPath "OpenCVPractice-windows-x64.zip" -Force
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenCVPractice-windows-x64
          path: OpenCVPractice-windows-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: OpenCVPractice-windows-x64.zip
          generate_release_notes: true
