name: Build and Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: write # softprops/action-gh-release 需要写权限才能创建 Release

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.8.2"
          host: "windows"
          target: "desktop"
          arch: "win64_msvc2022_64"

      # vcpkg 的二进制缓存：第一次跑会完整编译 OpenCV（很慢，30-60分钟+），
      # 之后只要 vcpkg.json 不变，会直接复用缓存的编译产物，几分钟内完成。
      - name: Export GitHub Actions cache variables (for vcpkg binary caching)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: "${{ github.workspace }}/vcpkg"

      - name: Configure (CMake + vcpkg manifest install)
        run: cmake --preset release
        env:
          VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

      - name: Build
        run: cmake --build build/release --config Release --parallel

      - name: Bundle Qt runtime DLLs
        run: |
          & "$env:QT_ROOT_DIR\bin\windeployqt.exe" --release --no-translations build\release\bin\OpenCVPractice.exe
        shell: pwsh

      - name: Bundle OpenCV / vcpkg runtime DLLs
        run: |
          Copy-Item "build\release\vcpkg_installed\x64-windows\bin\*.dll" "build\release\bin\" -Force
        shell: pwsh

      - name: Package zip
        run: |
          Compress-Archive -Path "build\release\bin\*" -DestinationPath "OpenCVPractice-windows-x64.zip" -Force
        shell: pwsh

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenCVPractice-windows-x64
          path: OpenCVPractice-windows-x64.zip

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: OpenCVPractice-windows-x64.zip
          generate_release_notes: true
